<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>10. Formulario Veterinaria</title>
    <style>
        table, td { font-family: verdana; border: 2px solid black; border-collapse: collapse; color: blue; }
        td { padding: 5px; }
        h3 { font-family: courier; color: red; font-size: 150%; }
        body { background-color: powderblue; }
    </style>
</head>
<body>
<center><h3>Registro Veterinaria</h3>
<form method="post">
    <table>
        <tr><td>Nombre</td><td><input type="text" name="nombre" required></td></tr>
        <tr><td>Edad</td><td><input type="number" name="edad" min="0" max="80"></td></tr>
        <tr><td>Fecha de Nacimiento</td><td><input type="date" name="nacimiento"></td></tr>
        <tr><td>Raza</td><td><input type="text" name="raza"></td></tr>
        <tr><td>Peso (kg)</td><td><input type="number" name="peso" step="0.1"></td></tr>
        <tr><td>Especie</td><td><input type="text" name="especie"></td></tr>
        <tr><td>Estatura (cm)</td><td><input type="number" name="estatura"></td></tr>
        <tr><td>Teléfono</td><td><input type="tel" name="telefono" pattern="[0-9]{10}"></td></tr>
        <tr><td>Dirección</td><td><input type="text" name="direccion"></td></tr>
        <tr><td colspan="2" align="center"><input type="submit" value="Guardar"> <input type="reset" value="Borrar"></td></tr>
    </table>
</form>
        <a href="index_u2.html">Regresar</a><br>

</center>
</body>
</html>
